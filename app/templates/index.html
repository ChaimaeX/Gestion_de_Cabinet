<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <!-- Boostrap link -->
     <!-- <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-select@1.13.14/dist/css/bootstrap-select.min.css"> -->
     <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css"
     integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N" crossorigin="anonymous">
     <link rel="stylesheet" href="{% static 'css/bootstrap.css' %}"> 
     <link rel="stylesheet" href="{% static 'css/style.css' %}">
     <script src="{% static 'js/jquery-3.7.1.min.js' %}"> </script>
     <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
     <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.3.0/font/bootstrap-icons.css" />
     
    <title>Cabinet Hafsa</title>
</head>
<body>
   <!-- Header  -->
   <header>
   <nav class="navbar navbar-expand-lg navbar-light bg-success navIcon">
    <a class="navbar-brand" href="{% url 'Home' %}"> Stock&Facturation </a>
    <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNavDropdown" aria-controls="navbarNavDropdown" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNavDropdown">
      <ul class="navbar-nav">
       
        <li class="nav-item dropdown active">
          <a class="nav-link dropdown-toggle"  id="navbarDropdownMenuLink" data-toggle="dropdown" aria-haspopup="true" aria-expanded="false" >
           Plus d'option
          </a>
          <div class="dropdown-menu" aria-labelledby="navbarDropdownMenuLink">
            <a class="dropdown-item" href="{% url 'Ajouter-produit'%}">Ajouter un produit</a>
            <!-- <a class="dropdown-item" href="#">Another action</a> -->
            <a class="dropdown-item" href="{% url 'Login' %}">Log out </a>
          </div>
        </li>
        <li class="nav-item ">
  
          <i class="bi bi-brightness-high-fill" id="toggleDark"></i>
        </li>
      </ul>
    </div>
  </nav>
  </header>
  <div class="container">
    <div class="wrapper">
      <br>
      {% for message in messages %}
      <div class="alert {{message.tags}} alert-dismissible" role="alert">
        <button type="button" class="close" data-dismiss="alert" aria-label="Close">
          <span aria-hidden="true">&times;</span>
        </button>
        {{ message|safe }}
      </div>
      {% endfor %}
    </div>
  </div> 

  <!-- end header -->
  <div class="container">

    {% block content %}

    {% endblock content %}

  </div>


<!-- Boostrap js link -->
  <!-- <script src="https://cdn.jsdelivr.net/npm/bootstrap-select@1.13.14/dist/js/bootstrap-select.min.js"></script> -->
  <script src="{% static 'js/js.js' %}" defer></script>
 
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
  <script src="{% static 'js/popper.min.js' %}"></script> 
  <script src="{% static 'js/bootstrap.js' %}"></script>
  <!-- <script src="{% static 'js/jquery-3.7.1.min.js' %}"></script> -->
  <!-- <script src="{% static 'js/popper.min.js' %}"></script>  -->
  <script src="{% static 'js/bootstrap.bundle.min.js' %}"></script> 
  <script src="https://cdn.jsdelivr.net/npm/bootstrap-select@1.13.14/dist/js/bootstrap-select.min.js"></script>
 

  <!-- <script src="{% static 'js/script.js' %}"></script>
   -->
   
</body> 
</html>
